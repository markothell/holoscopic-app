services:
  - type: web
    name: holoscopic-socket-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node websocket-server.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
